image: Visual Studio 2022
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
- pwsh: |
    Invoke-WebRequest "https://dot.net/v1/dotnet-install.ps1" -OutFile "./dotnet-install.ps1"
    ./dotnet-install.ps1 -JSonFile global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
# Build the library + CLI in Release (packs GeoConvert + GeoConvert.Cli nupkgs into nugets/)
- dotnet build src --configuration Release
# Run the test suite (TUnit executable), emitting a trx report and Cobertura coverage.
# PowerShell does not surface a native command's non-zero exit code as its own, so check
# $LASTEXITCODE explicitly — otherwise a failing test run would still pass the build.
- pwsh: |
    src/Tests/bin/Release/net11.0/Tests.exe --no-ansi --no-progress --report-trx --report-trx-filename unit.trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output unit.cobertura.xml
    if ($LASTEXITCODE -ne 0) { throw "Test run failed (exit code $LASTEXITCODE)." }
# Fail the build unless the shipped source is fully covered
- pwsh: ./src/coverage-check.ps1 -Report TestResults/unit.cobertura.xml -Threshold 100
on_finish:
- pwsh: |
    Get-ChildItem TestResults/*.trx -ErrorAction SilentlyContinue | % {
      (New-Object 'System.Net.WebClient').UploadFile("https://ci.appveyor.com/api/testresults/mstest/$($env:APPVEYOR_JOB_ID)", $_.FullName)
    }
    Get-ChildItem TestResults/*.cobertura.xml -ErrorAction SilentlyContinue | % { Push-AppveyorArtifact $_.FullName -FileName $_.Name }
on_failure:
- pwsh: |
    $root = (Get-Location).Path
    Get-ChildItem *.received.* -Recurse | % {
      $rel = $_.FullName.Substring($root.Length + 1)
      Push-AppveyorArtifact $_.FullName -FileName $rel
    }
test: off
artifacts:
- path: nugets/*.nupkg
- path: TestResults/*.cobertura.xml
